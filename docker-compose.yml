version: "3.9"
services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nlp-service:
    build: ./nlp-service
    ports:
      - "8000:8000"

  server:
    build: ./server
    ports:
      - "5555:5000"
    depends_on:
      - mongo
      - nlp-service
    env_file: .env

  client:
    build: ./client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  mongo-data:
